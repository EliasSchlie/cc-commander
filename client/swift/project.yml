name: CCCommander
options:
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  bundleIdPrefix: com.cc-commander
  xcodeVersion: "16.0"
packages:
  CCCommanderPackage:
    path: CCCommanderPackage
targets:
  CCCommander:
    type: application
    platform: [iOS, macOS]
    sources:
      - CCCommander
    dependencies:
      - package: CCCommanderPackage
        product: CCModels
      - package: CCCommanderPackage
        product: CCNetworking
      - package: CCCommanderPackage
        product: CCApp
    info:
      path: CCCommander/Info.plist
      properties:
        CFBundleDisplayName: CC Commander
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        HUB_BASE_URL: $(HUB_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cc-commander.app
        SWIFT_VERSION: "5.9"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        # Stable Apple Developer team so every local rebuild signs with
        # the same identity. Without this, xcodegen regeneration drops
        # the team and Xcode falls back to ad-hoc signing -- the binary's
        # code signature changes on every rebuild, the keychain ACL on
        # the previously-stored JWT no longer matches, and macOS pops
        # "allow / deny" on every launch. CI overrides this back to
        # empty for the GitHub runner (no Apple cert available).
        #
        # Forks: replace Q2U8K9N3BL with your own team ID (visible in
        # your Apple Developer account) and pass `CCC_EXPECTED_TEAM` to
        # scripts/build-app.sh, or update the default in that script.
        # The same team is currently used for both macOS and iOS configs;
        # if you ever distribute the iOS app under a different team,
        # scope this setting per-platform via `targets.CCCommander.platforms`.
        DEVELOPMENT_TEAM: Q2U8K9N3BL
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          HUB_BASE_URL: http://localhost:3000
        Release:
          HUB_BASE_URL: https://hub.cc-commander.com
