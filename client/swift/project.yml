name: CCCommander
options:
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  bundleIdPrefix: com.cc-commander
  xcodeVersion: "16.0"
packages:
  CCCommanderPackage:
    path: CCCommanderPackage
targets:
  CCCommander:
    type: application
    platform: [iOS, macOS]
    sources:
      - CCCommander
    dependencies:
      - package: CCCommanderPackage
        product: CCModels
      - package: CCCommanderPackage
        product: CCNetworking
      - package: CCCommanderPackage
        product: CCApp
    info:
      path: CCCommander/Info.plist
      properties:
        CFBundleDisplayName: CC Commander
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        HUB_BASE_URL: $(HUB_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cc-commander.app
        SWIFT_VERSION: "5.9"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
      configs:
        Debug:
          HUB_BASE_URL: http://localhost:3000
        Release:
          HUB_BASE_URL: https://hub.cc-commander.com
