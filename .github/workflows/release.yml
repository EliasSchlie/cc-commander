name: Release

# Builds, publishes, and (on main) deploys the hub Docker image.
#
#   - Every push to main → tag `:main` and `:sha-<short>`, then SSH
#     to the VPS and `docker compose up -d --build`. Runners pick up
#     the new VERSION via /api/version within their poll interval.
#   - Every `v*` tag → tag `:<version>` and `:latest` (immutable
#     releases). Tags do NOT auto-deploy: an operator should pull the
#     versioned image intentionally.
#
# The deploy job is opt-in: it only runs if the DEPLOY_SSH_HOST secret
# is set. Without it, the workflow stops after pushing the image and
# the legacy "ssh in and deploy by hand" flow still works.
#
# Required secrets for auto-deploy (Repo Settings → Secrets → Actions):
#   DEPLOY_SSH_HOST   — VPS hostname (e.g. cc-commander.eliasschlie.com)
#   DEPLOY_SSH_USER   — SSH user (e.g. root, deploy, ubuntu)
#   DEPLOY_SSH_KEY    — private key (the matching pubkey lives in
#                       ~/.ssh/authorized_keys on the VPS)
# Optional secrets:
#   DEPLOY_SSH_PORT   — defaults to 22
#   DEPLOY_HUB_DIR    — path to the cc-commander/hub checkout on the
#                       VPS (defaults to ~/cc-commander/hub)

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  # Cancel main-branch builds when a newer one comes in (rapid iteration).
  # NEVER cancel tag builds — that would leave a tag without its image.
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Hub tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck -w cc-commander-hub
      - run: npm test -w cc-commander-hub

  hub-image:
    name: Build & push hub image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute VERSION + image tags
        id: meta
        # VERSION is ALWAYS the full 40-char SHA, regardless of trigger
        # type. The runner reads its own version from `git rev-parse HEAD`
        # (also full SHA) and compares with `===`, so the formats must
        # match exactly. Tags get extra image tags for operator use, but
        # the auto-update key is the SHA.
        run: |
          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPO_LC}-hub"
          TAGS="${IMAGE}:sha-${SHORT_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME},${IMAGE}:latest"
          else
              TAGS="${TAGS},${IMAGE}:main"
          fi
          echo "Building VERSION=${FULL_SHA}"
          echo "version=${FULL_SHA}" >> "$GITHUB_OUTPUT"
          {
              echo "tags<<EOF"
              echo "${TAGS}"
              echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          # Build context is the repo root because hub depends on the
          # workspace package @cc-commander/protocol (sibling directory).
          context: .
          file: ./hub/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Verify the runner self-update contract: pull the just-pushed image
      # and confirm it serves the exact VERSION we baked in. If this drifts
      # (e.g. someone removes the ARG/ENV from the Dockerfile) the runner
      # update flow silently breaks because /api/version returns "".
      - name: Verify VERSION baked into image
        run: |
          # docker/metadata-action emits tags either newline- or
          # comma-separated depending on version. Normalise both into
          # newlines and pick the first non-empty entry.
          IMG="$(printf '%s' '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed '/^$/d' | head -n1)"
          echo "Verifying $IMG"
          docker pull "$IMG"
          BAKED="$(docker run --rm --entrypoint sh "$IMG" -c 'printf %s "$VERSION"')"
          EXPECTED='${{ steps.meta.outputs.version }}'
          if [ "$BAKED" != "$EXPECTED" ]; then
              echo "::error::VERSION mismatch in image: expected '$EXPECTED' got '$BAKED'"
              exit 1
          fi
          echo "OK: image VERSION=$BAKED"

  deploy-hub:
    name: Deploy hub to VPS
    runs-on: ubuntu-latest
    needs: hub-image
    # Tag pushes are immutable releases an operator should pull
    # intentionally; only auto-deploy on main.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Skip if deploy host not configured
        id: gate
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          if [ -z "$DEPLOY_SSH_HOST" ]; then
              echo "DEPLOY_SSH_HOST not set -- skipping deploy. Set the"
              echo "DEPLOY_SSH_HOST/USER/KEY secrets to enable auto-deploy."
              echo "skip=true" >> "$GITHUB_OUTPUT"
          else
              echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SSH deploy
        if: steps.gate.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_HUB_DIR: ${{ secrets.DEPLOY_HUB_DIR }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          # 4 minute window. Image pull is the long pole on cold or
          # slow VPS links (Node base + hub layer ~ a few hundred MB).
          command_timeout: 4m
          # Substitute DEPLOY_HUB_DIR via the remote shell, not the
          # script body, to keep it out of CI logs.
          envs: DEPLOY_HUB_DIR
          script: |
            set -euo pipefail
            HUB_DIR="${DEPLOY_HUB_DIR:-$HOME/cc-commander/hub}"
            cd "$HUB_DIR"

            # Refresh docker-compose.yml -- the only repo file the
            # deploy reads. Reset --hard, not pull, so operator
            # hand-edits on the box never silently merge into prod.
            git fetch origin main
            git reset --hard origin/main

            # Pull the :main image CI just pushed; compose detects
            # the new digest and recreates the hub container on
            # `up -d`. No source build happens on the VPS.
            docker compose pull
            docker compose up -d

            # Host-wide prune (docker has no per-stack scope). Safe
            # because dangling = unreferenced; if another stack on
            # this VPS just pulled and hasn't recreated yet, its old
            # image is still tagged and survives the prune.
            docker image prune -f

      - name: Verify deployed VERSION
        if: steps.gate.outputs.skip != 'true'
        env:
          EXPECTED: ${{ needs.hub-image.outputs.version }}
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          # The SSH deploy doesn't tell us when the new container is
          # ready to serve traffic. Poll /api/version against the
          # public hostname until we see the SHA we just built, or
          # bail after ~90s. Catches the "deploy succeeded but the
          # proxy is still routing to the old container" case.
          URL="https://${HOST}/api/version"
          for i in $(seq 1 30); do
              GOT="$(curl -fsS "$URL" 2>/dev/null | sed -n 's/.*"version":"\([^"]*\)".*/\1/p' || true)"
              if [ "$GOT" = "$EXPECTED" ]; then
                  echo "OK: $URL serves $GOT"
                  exit 0
              fi
              echo "attempt $i: got '$GOT', want '$EXPECTED'"
              sleep 3
          done
          echo "::error::deployed hub never reported expected VERSION=$EXPECTED"
          curl -fsS "$URL" || true
          exit 1
