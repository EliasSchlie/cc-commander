name: Release

# Builds and publishes the hub Docker image to GHCR on:
#   - Every push to main → tag `:main` and `:sha-<short>` (so runners
#     pick up new commits within their poll interval)
#   - Every `v*` tag → tag `:<version>` and `:latest` (immutable releases)
#
# The runner self-update flow only needs the Docker image to exist with
# a fresh VERSION baked in; runners do `git pull` of the runner repo on
# their own. So this workflow does not deploy to any VPS — that step
# stays manual / per-operator. Add an SSH-deploy job here if/when you
# decide to automate it.

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  # Cancel main-branch builds when a newer one comes in (rapid iteration).
  # NEVER cancel tag builds — that would leave a tag without its image.
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Hub tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck -w cc-commander-hub
      - run: npm test -w cc-commander-hub

  hub-image:
    name: Build & push hub image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Compute VERSION + image tags
        id: meta
        # VERSION is ALWAYS the full 40-char SHA, regardless of trigger
        # type. The runner reads its own version from `git rev-parse HEAD`
        # (also full SHA) and compares with `===`, so the formats must
        # match exactly. Tags get extra image tags for operator use, but
        # the auto-update key is the SHA.
        run: |
          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPO_LC}-hub"
          TAGS="${IMAGE}:sha-${SHORT_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME},${IMAGE}:latest"
          else
              TAGS="${TAGS},${IMAGE}:main"
          fi
          echo "Building VERSION=${FULL_SHA}"
          echo "version=${FULL_SHA}" >> "$GITHUB_OUTPUT"
          {
              echo "tags<<EOF"
              echo "${TAGS}"
              echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          # Build context is the repo root because hub depends on the
          # workspace package @cc-commander/protocol (sibling directory).
          context: .
          file: ./hub/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Verify the runner self-update contract: pull the just-pushed image
      # and confirm it serves the exact VERSION we baked in. If this drifts
      # (e.g. someone removes the ARG/ENV from the Dockerfile) the runner
      # update flow silently breaks because /api/version returns "".
      - name: Verify VERSION baked into image
        run: |
          # docker/metadata-action emits tags either newline- or
          # comma-separated depending on version. Normalise both into
          # newlines and pick the first non-empty entry.
          IMG="$(printf '%s' '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed '/^$/d' | head -n1)"
          echo "Verifying $IMG"
          docker pull "$IMG"
          BAKED="$(docker run --rm --entrypoint sh "$IMG" -c 'printf %s "$VERSION"')"
          EXPECTED='${{ steps.meta.outputs.version }}'
          if [ "$BAKED" != "$EXPECTED" ]; then
              echo "::error::VERSION mismatch in image: expected '$EXPECTED' got '$BAKED'"
              exit 1
          fi
          echo "OK: image VERSION=$BAKED"
