name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: ${{ matrix.component }} (Node)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [hub, runner]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.component }}/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  swift:
    name: Swift package + Xcode builds
    runs-on: macos-15
    defaults:
      run:
        working-directory: client/swift
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show available SDKs
        run: xcodebuild -showsdks

      - name: Run Swift package tests
        working-directory: client/swift/CCCommanderPackage
        run: swift test

      - name: Build macOS app
        run: |
          xcodebuild build \
            -project CCCommander.xcodeproj \
            -scheme CCCommander_macOS \
            -destination 'platform=macOS' \
            -quiet

      - name: Install iOS platform
        # macos-15 runners ship Xcode 16 but without the iOS platform.
        # Download it on demand (~3 GB, ~1 min).
        run: sudo xcodebuild -downloadPlatform iOS

      - name: Build iOS app
        run: |
          xcodebuild build \
            -project CCCommander.xcodeproj \
            -scheme CCCommander_iOS \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
