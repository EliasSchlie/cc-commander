name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: ${{ matrix.component }} (Node)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [hub, runner]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.component }}/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  swift:
    name: Swift package + Xcode builds
    # macos-14 ships Xcode 15 with the iOS 17 runtime preinstalled.
    # Our project deploys to iOS 17 / macOS 14 so this is the right match.
    runs-on: macos-14
    defaults:
      run:
        working-directory: client/swift
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode + SDKs
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Run Swift package tests
        working-directory: client/swift/CCCommanderPackage
        run: swift test

      - name: Build macOS app
        run: |
          xcodebuild build \
            -project CCCommander.xcodeproj \
            -scheme CCCommander_macOS \
            -destination 'platform=macOS' \
            -quiet

      - name: Build iOS app
        run: |
          xcodebuild build \
            -project CCCommander.xcodeproj \
            -scheme CCCommander_iOS \
            -destination 'generic/platform=iOS Simulator' \
            -quiet
