name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: ${{ matrix.component }} (Node)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [hub, runner]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.component }}/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  swift-test:
    name: Swift package tests
    # Xcode 16 (macos-15) is required for the swift-testing 'Testing' module.
    runs-on: macos-15
    defaults:
      run:
        working-directory: client/swift/CCCommanderPackage
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - run: swift test

  xcode-build:
    name: Xcode app builds (iOS + macOS)
    # macos-14 ships Xcode 15 with the iOS 17 runtime preinstalled.
    # Our deployment targets are iOS 17 / macOS 14 so this matches.
    runs-on: macos-14
    defaults:
      run:
        working-directory: client/swift
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode + SDKs
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build macOS app
        run: |
          xcodebuild build \
            -project CCCommander.xcodeproj \
            -scheme CCCommander_macOS \
            -destination 'platform=macOS' \
            -quiet

      - name: Build iOS app
        run: |
          xcodebuild build \
            -project CCCommander.xcodeproj \
            -scheme CCCommander_iOS \
            -destination 'generic/platform=iOS Simulator' \
            -quiet
