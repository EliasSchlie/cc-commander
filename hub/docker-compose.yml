services:
  hub:
    # Both `image` and `build` are present so the same compose file
    # works for prod (auto-deploy) and local dev:
    #   - Prod (`docker compose pull && docker compose up -d`):
    #     pulls the prebuilt image from GHCR. release.yml pushes
    #     `:main` on every push to main, so the deploy job gets the
    #     exact binary CI tested. Package visibility is public, so
    #     no docker login is required on the VPS.
    #   - Local dev (`docker compose up -d --build`): builds from
    #     source. The build context is the repo root because hub
    #     depends on the workspace package @cc-commander/protocol
    #     (sibling directory).
    image: ghcr.io/eliasschlie/cc-commander-hub:main
    build:
      context: ..
      dockerfile: hub/Dockerfile
    container_name: cc-commander-hub
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Generate once with: openssl rand -hex 32
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: "3000"
      HUB_DB_PATH: /data/hub.db
      # VERSION is baked into the image via Dockerfile ARG and read
      # from the container env by /api/version. Do NOT add
      # `VERSION: ${VERSION:-}` here -- compose env entries override
      # image ENV, so an unset host var would blank the baked value
      # and break the runner self-update protocol.
    volumes:
      - hub-data:/data

volumes:
  hub-data:
